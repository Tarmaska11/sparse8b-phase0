name: sparse8b-quantcheck
# Decisive control experiment after Phase-0 run 1 (GATE-S1 FAIL): dense 8b-q3 scored BELOW
# dense 3b-q4 on every metric. Is q3 quantization the villain (=> pursue 8b-q4-via-residency),
# or is the simulator's q3f16_0 dequant suspect? Dense 8b-q4 ppl+bench answers it directly.
# No calibration needed (sparsity 0). Runs on the public mirror; push to ci/sparse8b-quantcheck.

on:
  workflow_dispatch: {}
  push:
    branches: ['ci/sparse8b-quantcheck']

defaults:
  run:
    working-directory: phase0

jobs:
  quantcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          - {model: "8b-q4", task: "ppl"}
          - {model: "8b-q4", task: "bench"}
          - {model: "3b-q4", task: "ppl"}   # re-confirm baseline in same run for apples-to-apples
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/models
          key: mlc-models-v1-${{ matrix.model }}
      - name: download weights
        run: |
          python -c "from huggingface_hub import snapshot_download as d; repos={'8b-q4':'mlc-ai/Llama-3.1-8B-Instruct-q4f16_1-MLC','3b-q4':'mlc-ai/Llama-3.2-3B-Instruct-q4f16_0-MLC'}; r=repos['${{ matrix.model }}']; d(r, local_dir='${{ github.workspace }}/models/'+r.split('/')[-1], allow_patterns=['*.json','*.bin'])"
      - name: run
        run: |
          if [ "${{ matrix.task }}" = "ppl" ]; then
            python ppl.py --model ${{ matrix.model }} --models-root ${{ github.workspace }}/models --sparsity 0 --threads 4
          else
            python bench.py --model ${{ matrix.model }} --models-root ${{ github.workspace }}/models --sparsity 0 --suite both --threads 4
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: quantcheck-${{ matrix.model }}-${{ matrix.task }}
          path: |
            phase0/ppl_*.json
            phase0/bench_*.json

