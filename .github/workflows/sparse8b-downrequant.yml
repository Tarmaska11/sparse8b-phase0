name: sparse8b-downrequant
# M3 go/no-go gate: the residency bundle format must requantize down_proj along H (it's natively
# quantized along the neuron axis, unrepackable losslessly). This measures the ppl cost of that
# requant on 8b-q4, at the residency operating point. Compare to the CLEAN numbers (same harness):
#   gate-select@40 = 7.61, element-TEAL@50 = 7.88 (both beat 3b-q4 dense 8.80).
# PASS if down-requant versions stay well under 8.80 (still beat the 3B). Public mirror.

on:
  workflow_dispatch: {}
  push:
    branches: ['ci/sparse8b-downrequant']

defaults:
  run:
    working-directory: phase0

jobs:
  calib:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip}
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/models
          key: mlc-models-v1-8b-q4
      - name: download 8b-q4
        run: |
          python -c "from huggingface_hub import snapshot_download as d; r='mlc-ai/Llama-3.1-8B-Instruct-q4f16_1-MLC'; d(r, local_dir='${{ github.workspace }}/models/'+r.split('/')[-1], allow_patterns=['*.json','*.bin'])"
      - run: python calibrate.py --model 8b-q4 --models-root ${{ github.workspace }}/models --tokens 32768 --threads 4
      - uses: actions/upload-artifact@v4
        with: {name: thresholds-8b-q4-dq, path: phase0/thresholds-8b-q4.json}

  ppl:
    needs: calib
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          - {sp: 40, sel: gate, tag: "gate40-dq"}
          - {sp: 50, sel: teal, tag: "teal50-dq"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip}
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/models
          key: mlc-models-v1-8b-q4
      - name: download 8b-q4
        run: |
          python -c "from huggingface_hub import snapshot_download as d; r='mlc-ai/Llama-3.1-8B-Instruct-q4f16_1-MLC'; d(r, local_dir='${{ github.workspace }}/models/'+r.split('/')[-1], allow_patterns=['*.json','*.bin'])"
      - uses: actions/download-artifact@v4
        with: {name: thresholds-8b-q4-dq, path: phase0}
      - run: python ppl.py --model 8b-q4 --models-root ${{ github.workspace }}/models --thresholds thresholds-8b-q4.json --sparsity ${{ matrix.sp }} --select ${{ matrix.sel }} --granularity element --down-requant --out ppl_${{ matrix.tag }}.json --threads 4
      - uses: actions/upload-artifact@v4
        with:
          name: downrequant-${{ matrix.tag }}
          path: phase0/ppl_${{ matrix.tag }}.json

